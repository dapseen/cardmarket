---
apiVersion: v1
kind: Namespace
metadata:
  name: cardmarket
  labels:
    app.kubernetes.io/name: cardmarket
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cardmarket
  namespace: cardmarket
  labels:
    app.kubernetes.io/name: cardmarket
spec:
  replicas: 1
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 120
  selector:
    matchLabels:
      app.kubernetes.io/name: cardmarket
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cardmarket
    spec:
      # Required when pulling from private GHCR (create secret first):
      imagePullSecrets:
        - name: ghcr-credentials
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cardmarket
          image: ghcr.io/dapseen/cardmarket:0.2.2
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cardmarket
  namespace: cardmarket
  labels:
    app.kubernetes.io/name: cardmarket
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cardmarket
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cardmarket
  namespace: cardmarket
  labels:
    app.kubernetes.io/name: cardmarket
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/limit-rps: "20"
spec:
  ingressClassName: nginx
  rules:
    - host: cardmarket.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cardmarket
                port:
                  number: 80
